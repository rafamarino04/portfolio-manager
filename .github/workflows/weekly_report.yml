name: Report settimanale portafoglio

on:
  schedule:
    # Ogni lunedi' alle 07:00 UTC (08:00/09:00 ora italiana a seconda dell'ora legale)
    - cron: "0 7 * * 1"
  workflow_dispatch: {}  # permette di lanciarlo a mano da GitHub > Actions > Run workflow

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Genera report
        run: python scripts/generate_weekly_report.py

      - name: Commit report
        run: |
          git config user.name "portfolio-bot"
          git config user.email "actions@github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Report settimanale $(date +'%Y-%m-%d')"
          git push
